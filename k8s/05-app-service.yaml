apiVersion: v1
kind: Service
metadata:
  name: chat-app
  namespace: ai-workshop
  labels:
    app: chat-app
    component: frontend
spec:
  type: NodePort
  selector:
    app: chat-app
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30706
  sessionAffinity: None
