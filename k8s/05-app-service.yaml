apiVersion: v1
kind: Service
metadata:
  name: chat-app
  namespace: ai-workshop
  labels:
    app: chat-app
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: chat-app
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  sessionAffinity: None
